<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Okey, TV1, TV2, TV6, Berita & Sukan RTM Player</title>
    <style>
      .player-container {
        max-width: 800px;
        margin: 30px auto;
        text-align: center;
        background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
      video {
        width: 100%;
        max-height: 450px;
        background: #1a1a1a;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        margin-top: 15px;
      }
      button {
        padding: 12px 0;
        width: 130px;
        cursor: pointer;
        border: none;
        border-radius: 25px;
        color: #fff;
        font-family: "Arial", sans-serif;
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        text-align: center;
      }
      .okey-button {
        background: linear-gradient(to right, #ff9a9e, #fad0c4);
      }
      .okey-button:hover {
        background: linear-gradient(to right, #ff758c, #ffb199);
        transform: scale(1.05);
      }
      .tv1-button {
        background: linear-gradient(to right, #a1c4fd, #c2e9fb);
      }
      .tv1-button:hover {
        background: linear-gradient(to right, #84a9ff, #a6d8ff);
        transform: scale(1.05);
      }
      .tv2-button {
        background: linear-gradient(to right, #ffcc99, #ffeda1);
      }
      .tv2-button:hover {
        background: linear-gradient(to right, #ffbb66, #ffde80);
        transform: scale(1.05);
      }
      .tv6-button {
        background: linear-gradient(to right, #d4a5ff, #e2c1ff);
      }
      .tv6-button:hover {
        background: linear-gradient(to right, #c17cff, #d4a5ff);
        transform: scale(1.05);
      }
      .berita-button {
        background: linear-gradient(to right, #80d8ff, #b3e6ff);
      }
      .berita-button:hover {
        background: linear-gradient(to right, #4db8ff, #99d6ff);
        transform: scale(1.05);
      }
      .sukan-button {
        background: linear-gradient(to right, #99ff99, #ccffcc);
      }
      .sukan-button:hover {
        background: linear-gradient(to right, #66ff66, #b3ffb3);
        transform: scale(1.05);
      }
      .url-input {
        display: none;
      }
      body {
        background: #f5f7fa;
        font-family: "Arial", sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="player-container">
      <input
        type="text"
        class="url-input"
        id="videoUrl"
        value="https://d25tgymtnqzu8s.cloudfront.net/smil:okey/chunklist_b1096000_slENG.m3u8?id=3&id=3"
      />
      <video id="videoPlayer" controls autoplay>
        <source
          id="videoSource"
          src="https://d25tgymtnqzu8s.cloudfront.net/smil:okey/chunklist_b1096000_slENG.m3u8?id=3&id=3"
          type="application/x-mpegURL"
        />
        Browser Anda tidak mendukung video player.
      </video>
      <div class="controls">
        <button class="okey-button" onclick="playVideoOkey()">TV Okey</button>
        <button class="tv1-button" onclick="playVideoTV1()">TV1</button>
        <button class="tv2-button" onclick="playVideoTV2()">TV2</button>
        <button class="tv6-button" onclick="playVideoTV6()">TV6</button>
        <button class="berita-button" onclick="playVideoBerita()">
          Berita RTM
        </button>
        <button class="sukan-button" onclick="playVideoSukan()">
          Sukan RTM
        </button>
      </div>
    </div>

    <script>
      const video = document.getElementById("videoPlayer");
      const videoSource = document.getElementById("videoSource");

      const defaultUrlOkey =
        "https://d25tgymtnqzu8s.cloudfront.net/smil:okey/chunklist_b1096000_slENG.m3u8?id=3&id=3";
      const defaultUrlTV1 =
        "https://d25tgymtnqzu8s.cloudfront.net/smil:tv1/chunklist_b1096000_slENG.m3u8?id=1&id=1";
      const defaultUrlTV2 =
        "https://d25tgymtnqzu8s.cloudfront.net/smil:tv2/chunklist_b1096000_slENG.m3u8?id=2&id=2";
      const defaultUrlTV6 =
        "https://d25tgymtnqzu8s.cloudfront.net/smil:tv6/chunklist_b1096000_slENG.m3u8?id=6&id=6";
      const defaultUrlBerita =
        "https://d25tgymtnqzu8s.cloudfront.net/smil:berita/chunklist_b1096000_slENG.m3u8?id=5&id=5";
      const defaultUrlSukan =
        "https://d25tgymtnqzu8s.cloudfront.net/smil:sukan/chunklist_b1096000_slENG.m3u8?id=4&id=4";

      window.onload = function () {
        videoSource.src = defaultUrlOkey;
        video.load();
        video.play().catch((error) => {
          console.log("Autoplay prevented:", error);
        });
      };

      function playVideoOkey() {
        videoSource.src = defaultUrlOkey;
        video.load();
        video.play();
      }

      function playVideoTV1() {
        videoSource.src = defaultUrlTV1;
        video.load();
        video.play();
      }

      function playVideoTV2() {
        videoSource.src = defaultUrlTV2;
        video.load();
        video.play();
      }

      function playVideoTV6() {
        videoSource.src = defaultUrlTV6;
        video.load();
        video.play();
      }

      function playVideoBerita() {
        videoSource.src = defaultUrlBerita;
        video.load();
        video.play();
      }

      function playVideoSukan() {
        videoSource.src = defaultUrlSukan;
        video.load();
        video.play();
      }
    </script>
  </body>
</html>
