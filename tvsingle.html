<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV URL Player</title>
    <style>
      .player-container {
        max-width: 800px;
        margin: 20px auto;
        text-align: center;
      }
      video {
        width: 100%;
        max-height: 450px;
        background: black;
      }
      .controls {
        margin-top: 10px;
      }
      button {
        padding: 10px 20px;
        margin: 0 5px;
        cursor: pointer;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
      }
      button:hover {
        background-color: #45a049;
      }
      .url-input {
        margin-bottom: 10px;
        padding: 5px;
        width: 70%;
      }
    </style>
  </head>
  <body>
    <div class="player-container">
      <input
        type="text"
        class="url-input"
        id="videoUrl"
        placeholder="Masukkan URL TV Stream"
      />
      <video id="videoPlayer" controls>
        <source id="videoSource" src="" type="video/mp4" />
        Browser Anda tidak mendukung video player.
      </video>
      <div class="controls">
        <button onclick="playVideo()">Play</button>
        <button onclick="pauseVideo()">Stop</button>
        <button onclick="rewindVideo()">Rewind</button>
        <button onclick="forwardVideo()">Forward</button>
      </div>
    </div>

    <script>
      const video = document.getElementById("videoPlayer");
      const videoSource = document.getElementById("videoSource");
      const urlInput = document.getElementById("videoUrl");

      function playVideo() {
        const url = urlInput.value;
        if (url) {
          videoSource.src = url;
          video.load();
          video.play();
        } else {
          alert("Masukkan URL stream terlebih dahulu!");
        }
      }

      function pauseVideo() {
        video.pause();
      }

      function rewindVideo() {
        video.currentTime -= 10; // Mundur 10 detik
      }

      function forwardVideo() {
        video.currentTime += 10; // Maju 10 detik
      }

      // Update source saat input URL berubah
      urlInput.addEventListener("change", function () {
        videoSource.src = this.value;
        video.load();
      });
    </script>
  </body>
</html>
