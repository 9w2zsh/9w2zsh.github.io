<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selamat Hari Raya Aidilfitri</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap");

      body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: white;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        overflow: hidden;
        position: relative;
      }
      .card {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        position: relative;
        z-index: 2;
        backdrop-filter: blur(10px);
        width: 90%;
        max-width: 400px;
      }
      h1 {
        font-family: "Amiri", serif;
        font-size: 36px;
        margin-bottom: 10px;
        font-weight: bold;
      }
      p {
        font-size: 16px;
      }
      #ucapan-khas {
        font-style: italic;
        font-size: 18px;
        margin-bottom: 10px;
        color: #ffcc00;
      }
      button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 18px;
        border: none;
        background: #ff0080;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        font-weight: bold;
      }
      button:hover {
        background: #ff0055;
      }
      .scratch-container {
        position: relative;
        margin-top: 20px;
        width: 90%;
        max-width: 300px;
        height: 100px;
        border-radius: 10px;
        overflow: hidden;
        background: white;
        color: black;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: bold;
        text-align: center;
        user-select: none;
        position: relative;
      }
      .scratch-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: silver;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: bold;
        color: black;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>
        🌙 <span style="font-size: 40px">Selamat Hari Raya Aidilfitri</span> 🌙
      </h1>
      <p id="ucapan-khas">
        Kami sekeluarga memohon ampun sepuluh jari jika ada salah silap,
        terkasar bahasa, terminum, termakan, terkata dan semoga kita semua
        diberi kesihatan yang berpanjangan.
      </p>
      <p><strong>Daripada: Raja Ismail & Najwa Sekeluarga</strong></p>
      <button onclick="playMusic()">🔊 Tekan di Sini</button>
    </div>

    <div class="scratch-container">
      <div class="scratch-overlay" id="scratchLayer">Sila Gores di Sini</div>
      <p id="message" style="display: none"></p>
    </div>

    <audio id="rayaMusic">
      <source
        src="https://www.dropbox.com/s/j9hcqqbrq6h9m7j/Datuk%20Sharifah%20Aini%20Suasana%20Hari%20Raya%20Audio%20Video.mp3?raw=1"
        type="audio/mpeg"
      />
      Browser anda tidak menyokong audio.
    </audio>

    <script>
      function playMusic() {
        var audio = document.getElementById("rayaMusic");
        audio.play().catch((error) => {
          alert("Sila klik sekali lagi untuk mainkan lagu!");
        });
      }

      // Senarai ucapan Hari Raya
      var messages = [
        "Selamat Hari Raya! Semoga murah rezeki dan panjang umur.",
        "Maaf Zahir & Batin. Semoga hati kita selalu damai.",
        "Semoga Aidilfitri ini membawa kebahagiaan kepada semua.",
        "Nikmati ketupat dan rendang bersama keluarga tersayang!",
        "Selamat pulang ke kampung, berhati-hati di jalan raya.",
      ];

      // Paparkan ucapan rawak dalam kotak gores
      document.getElementById("message").innerText =
        messages[Math.floor(Math.random() * messages.length)];

      // Fungsi scratch untuk buang lapisan overlay
      document
        .getElementById("scratchLayer")
        .addEventListener("mousedown", function () {
          this.style.display = "none";
          document.getElementById("message").style.display = "block";
        });

      document
        .getElementById("scratchLayer")
        .addEventListener("touchstart", function () {
          this.style.display = "none";
          document.getElementById("message").style.display = "block";
        });
    </script>
  </body>
</html>
