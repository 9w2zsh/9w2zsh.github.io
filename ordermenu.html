<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legasi Mak Ulu</title>
    <style>
      /* Gaya Umum */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #1a1a1a;
        color: #fff;
        overflow-x: hidden;
      }

      /* Intro Section */
      #intro {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        animation: fadeOut 2s forwards;
      }

      #intro-logo {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #intro-logo img {
        max-width: 80%;
        max-height: 50vh;
        width: auto;
        height: auto;
        opacity: 0;
        transform: translateY(20px);
        animation: slideUp 0.5s ease forwards;
        animation-delay: 0.2s;
      }

      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeOut {
        0% {
          opacity: 1;
        }
        80% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          visibility: hidden;
        }
      }

      /* Main Page */
      #main {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px;
        opacity: 0;
        animation: fadeIn 1s forwards 2s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .menu-container {
        display: flex;
        flex-direction: column;
        gap: 30px;
        margin-top: 40px;
      }

      .menu-item {
        background: #2b2b2b;
        border-radius: 10px;
        padding: 20px;
        text-align: center;
        transition: transform 0.3s ease;
        max-width: 500px;
        margin: 0 auto;
      }

      .menu-item:hover {
        transform: translateY(-5px);
      }

      .menu-item img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 5px;
        margin-bottom: 15px;
      }

      .menu-item h3 {
        font-size: 1.5rem;
        margin-bottom: 10px;
      }

      .menu-item p {
        color: #ccc;
        margin-bottom: 10px;
      }

      .price {
        font-size: 1.2rem;
        color: #ffd700;
        margin-bottom: 15px;
      }

      .quantity {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
      }

      .quantity button {
        width: 30px;
        height: 30px;
        background: #ffd700;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.2rem;
      }

      .quantity span {
        font-size: 1.2rem;
        width: 30px;
        text-align: center;
      }

      /* Order Table */
      #order-section {
        margin-top: 40px;
        text-align: center;
      }

      #order-table {
        width: 100%;
        max-width: 500px;
        margin: 20px auto;
        border-collapse: collapse;
        background: #2b2b2b;
        border-radius: 10px;
        overflow: hidden;
      }

      #order-table th,
      #order-table td {
        padding: 10px;
        border-bottom: 1px solid #444;
      }

      #order-table th {
        background: #ffd700;
        color: #1a1a1a;
      }

      #order-table td {
        color: #fff;
      }

      #order-table .total-row td {
        font-weight: bold;
        color: #ffd700;
        background: #333;
      }

      #order-table .title-row th {
        font-size: 1.5rem;
        padding: 15px;
      }

      /* Customer Info Section */
      #customer-info {
        margin-top: 40px;
        text-align: center;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }

      #customer-info h2 {
        margin-bottom: 20px;
      }

      #customer-info form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      #customer-info label {
        text-align: left;
        font-size: 1.1rem;
      }

      #customer-info input,
      #customer-info textarea {
        padding: 10px;
        border: none;
        border-radius: 5px;
        background: #2b2b2b;
        color: #fff;
        font-size: 1rem;
      }

      #customer-info textarea {
        resize: vertical;
        min-height: 100px;
      }

      #submit-order {
        padding: 10px;
        background: #ffd700;
        color: #1a1a1a;
        border: none;
        border-radius: 5px;
        font-size: 1.2rem;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      #submit-order:hover {
        background: #e6c200;
      }
    </style>
    <script src="https://interactivelink.co/api/pgm-page-monitor.js"></script>
  </head>
  <body>
    <!-- Intro Section with Logo -->
    <div id="intro">
      <div id="intro-logo">
        <img
          src="https://arleta.site/interactivelink/271/Logo-Legasi-MU.png"
          alt="Legasi Mak Ulu Logo"
        />
      </div>
    </div>

    <!-- Main Page -->
    <div id="main">
      <h2 style="text-align: center; margin-bottom: 20px">Menu Makanan</h2>
      <div class="menu-container">
        <!-- Menu Item 1 -->
        <div class="menu-item" data-name="Dendeng Daging" data-price="45.00">
          <img
            src="https://arleta.site/interactivelink/271/8.png"
            alt="Dendeng Daging"
          />
          <h3>Dendeng Daging</h3>
          <p>Daging kering disalut sos pedas manis khas Mak Ulu</p>
          <div class="price">RM 45.00</div>
          <div class="quantity">
            <button class="minus">-</button>
            <span class="qty">0</span>
            <button class="plus">+</button>
          </div>
        </div>

        <!-- Menu Item 2 -->
        <div class="menu-item" data-name="Kambing Perap" data-price="55.00">
          <img
            src="https://arleta.site/interactivelink/271/9.png"
            alt="Kambing Perap"
          />
          <h3>Kambing Perap</h3>
          <p>Kambing diperap rempah istimewa dan dibakar sempurna</p>
          <div class="price">RM 55.00</div>
          <div class="quantity">
            <button class="minus">-</button>
            <span class="qty">0</span>
            <button class="plus">+</button>
          </div>
        </div>
      </div>

      <!-- Order Section -->
      <div id="order-section">
        <table id="order-table">
          <thead>
            <tr class="title-row">
              <th colspan="3">Senarai Pesanan</th>
            </tr>
            <tr>
              <th>Makanan</th>
              <th>Kuantiti</th>
              <th>Harga (RM)</th>
            </tr>
          </thead>
          <tbody id="order-body"></tbody>
        </table>
      </div>

      <!-- Customer Info Section -->
      <div id="customer-info">
        <h3>Maklumat Pelanggan</h3>
        <form id="customer-form">
          <label for="name">Nama:</label>
          <input type="text" id="name" name="name" required />

          <label for="phone">No Telefon:</label>
          <input type="tel" id="phone" name="phone" required />

          <label for="address">Alamat:</label>
          <textarea id="address" name="address" required></textarea>

          <button type="submit" id="submit-order">Hantar Pesanan</button>
        </form>
      </div>
    </div>

    <script>
      // Quantity Control and Order Table Update
      const orderBody = document.getElementById("order-body");
      const customerForm = document.getElementById("customer-form");

      function updateOrderTable() {
        orderBody.innerHTML = ""; // Kosongkan jadual
        let totalPrice = 0;

        document.querySelectorAll(".menu-item").forEach((item) => {
          const name = item.getAttribute("data-name");
          const price = parseFloat(item.getAttribute("data-price"));
          const qty = parseInt(item.querySelector(".qty").textContent);

          if (qty > 0) {
            const row = document.createElement("tr");
            row.innerHTML = `
                        <td>${name}</td>
                        <td>${qty}</td>
                        <td>${(price * qty).toFixed(2)}</td>
                    `;
            orderBody.appendChild(row);
            totalPrice += price * qty;
          }
        });

        // Tambah baris jumlah dalam jadual
        if (totalPrice > 0) {
          const totalRow = document.createElement("tr");
          totalRow.classList.add("total-row");
          totalRow.innerHTML = `
                    <td colspan="2">Jumlah</td>
                    <td>${totalPrice.toFixed(2)}</td>
                `;
          orderBody.appendChild(totalRow);
        }
      }

      document.querySelectorAll(".menu-item").forEach((item) => {
        const minus = item.querySelector(".minus");
        const plus = item.querySelector(".plus");
        const qty = item.querySelector(".qty");

        minus.addEventListener("click", () => {
          let value = parseInt(qty.textContent);
          if (value > 0) {
            qty.textContent = value - 1;
            updateOrderTable();
          }
        });

        plus.addEventListener("click", () => {
          let value = parseInt(qty.textContent);
          qty.textContent = value + 1;
          updateOrderTable();
        });
      });

      // Handle Form Submission and WhatsApp Integration
      customerForm.addEventListener("submit", (e) => {
        e.preventDefault();

        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const address = document.getElementById("address").value;

        let orderDetails = "";
        let totalPrice = 0;

        document.querySelectorAll(".menu-item").forEach((item) => {
          const name = item.getAttribute("data-name");
          const price = parseFloat(item.getAttribute("data-price"));
          const qty = parseInt(item.querySelector(".qty").textContent);

          if (qty > 0) {
            orderDetails += `${name}: ${qty} x RM ${price.toFixed(2)} = RM ${(
              price * qty
            ).toFixed(2)}\n`;
            totalPrice += price * qty;
          }
        });

        if (totalPrice === 0) {
          alert(
            "Sila pilih sekurang-kurangnya satu item sebelum menghantar pesanan."
          );
          return;
        }

        const message =
          `Pesanan Baru:\n\n` +
          `Nama: ${name}\n` +
          `No Telefon: ${phone}\n` +
          `Alamat: ${address}\n\n` +
          `Senarai Pesanan:\n${orderDetails}\n` +
          `Jumlah: RM ${totalPrice.toFixed(2)}`;

        const whatsappURL = `https://wa.me/60192199949?text=${encodeURIComponent(
          message
        )}`;
        window.open(whatsappURL, "_blank");
      });
    </script>
  </body>
</html>
